name: Release

on:
  push:
    tags:
      - '*/v*'
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name (must match clients/<name>.json without extension)'
        required: true
        type: string
      version:
        description: 'Version (e.g., 1.0.5)'
        required: true
        type: string
      create_tag:
        description: 'Also create and push the git tag <client>/v<version>'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.event.inputs.client || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout zota-desktop (no submodules yet)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Parse inputs (tag or dispatch)
        id: inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CLIENT="${{ github.event.inputs.client }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            # Use the JS parser so the format is enforced in exactly one place
            PARSED=$(node -e "
              const { parseReleaseTag } = require('./scripts/lib/parse-tag');
              const p = parseReleaseTag(process.argv[1]);
              console.log(p.client + '|' + p.version);
            " "${GITHUB_REF}")
            CLIENT="${PARSED%%|*}"
            VERSION="${PARSED##*|}"
          fi
          if [ -z "$CLIENT" ] || [ -z "$VERSION" ]; then
            echo "::error::Could not parse client/version from tag or inputs"
            exit 1
          fi
          # Find the client config file matching the parsed client name.
          # Match by file basename, clientId field, or basename-contains.
          CONFIG_PATH=$(node -e "
            const fs = require('fs'), path = require('path');
            const want = process.argv[1];
            const files = fs.readdirSync('clients').filter(f => f.endsWith('.json'));
            for (const f of files) {
              const base = path.basename(f, '.json');
              const cfg = JSON.parse(fs.readFileSync(path.join('clients', f), 'utf8'));
              if (base === want || cfg.clientId === want || base.includes(want)) {
                console.log(path.join('clients', f));
                process.exit(0);
              }
            }
            process.exit(2);
          " "$CLIENT") || {
            echo "::error::No client config found matching '$CLIENT' in clients/*.json"
            exit 1
          }
          echo "client=$CLIENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "config_path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved: client=$CLIENT version=$VERSION config=$CONFIG_PATH"

      - name: Configure git auth via PAT
        shell: bash
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::RELEASE_TOKEN secret is not set on this repository"
            exit 1
          fi
          # Rewrite SSH submodule URLs to HTTPS (no token in URL).
          # Use --add because url.X.insteadOf is multi-value — without --add the
          # second call overwrites the first instead of appending.
          git config --global --add url."https://github.com/".insteadOf "git@github.com-zota:"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          # Token travels as an Authorization header, not in URLs or config files
          AUTH="Authorization: Basic $(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git config --global "http.https://github.com/.extraheader" "$AUTH"

      - name: Read variant + branches from client config
        id: cfg
        shell: bash
        run: |
          export CONFIG="${{ steps.inputs.outputs.config_path }}"
          VARIANT=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.CONFIG,'utf8')).variant)")
          BACKEND_BRANCH=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.CONFIG,'utf8')).backendBranch)")
          FRONTEND_BRANCH=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.CONFIG,'utf8')).frontendBranch)")
          BACKEND_DIR="sourcecode/zota-${VARIANT}-backend-ts"
          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"
          echo "backend_branch=$BACKEND_BRANCH" >> "$GITHUB_OUTPUT"
          echo "frontend_branch=$FRONTEND_BRANCH" >> "$GITHUB_OUTPUT"
          echo "backend_dir=$BACKEND_DIR" >> "$GITHUB_OUTPUT"

      - name: Init the right submodules at the right branches
        shell: bash
        env:
          BACKEND_DIR: ${{ steps.cfg.outputs.backend_dir }}
          BACKEND_BRANCH: ${{ steps.cfg.outputs.backend_branch }}
          FRONTEND_BRANCH: ${{ steps.cfg.outputs.frontend_branch }}
        run: |
          # Only init the variant we need (skip the other backend variant)
          git submodule update --init --depth 1 "$BACKEND_DIR"
          git submodule update --init --depth 1 sourcecode/zota-react-frontend

          # Switch each to the client's branch.
          # Explicit refspec creates origin/<branch> tracking ref; then -B makes a local branch.
          ( cd "$BACKEND_DIR" \
              && git fetch origin "$BACKEND_BRANCH:refs/remotes/origin/$BACKEND_BRANCH" --depth 1 \
              && git checkout -B "$BACKEND_BRANCH" "origin/$BACKEND_BRANCH" )
          ( cd sourcecode/zota-react-frontend \
              && git fetch origin "$FRONTEND_BRANCH:refs/remotes/origin/$FRONTEND_BRANCH" --depth 1 \
              && git checkout -B "$FRONTEND_BRANCH" "origin/$FRONTEND_BRANCH" )

          # Init nested submodules (backend admin settings)
          ( cd "$BACKEND_DIR" && git submodule update --init --recursive --depth 1 )

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop deps
        # `npm install` (not `npm ci`) because @zota/backend is a file-dep on a
        # submodule whose own package.json varies per client branch. `npm ci`
        # would fail with "lockfile not in sync" since the desktop's lockfile
        # was generated against a different backend branch.
        run: npm install --no-audit --no-fund

      - name: Install backend deps
        shell: bash
        # legacy-peer-deps because the backend has joi@18 while
        # express-joi-validation peers on joi@17 — npm 7+ blocks strict
        # peer-dep violations by default. The combination has worked in
        # practice for the project, so we accept the looser resolution.
        env:
          npm_config_legacy_peer_deps: 'true'
        run: |
          cd "${{ steps.cfg.outputs.backend_dir }}"
          npm run install-all

      - name: Install frontend deps
        shell: bash
        run: |
          cd sourcecode/zota-react-frontend
          npm install

      - name: Build frontend
        shell: bash
        # CI=false: Create React App turns ESLint warnings into errors when CI=true
        # (GitHub Actions auto-sets it). The frontend has many pre-existing
        # lint warnings; we don't want to gate releases on them.
        env:
          CI: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          cd sourcecode/zota-react-frontend
          npm run build

      - name: Build backend
        shell: bash
        # TEMPORARY: `|| true` ignores tsc exit code so pre-existing TS errors on
        # client branches don't block release builds. tsc still emits the .js
        # output for files that compile. The bundled app may crash at runtime
        # on code paths that hit the broken compilation. Remove `|| true` once
        # the backend builds cleanly on every client branch.
        run: |
          cd "${{ steps.cfg.outputs.backend_dir }}"
          npm run build-main || echo "::warning::backend build had TypeScript errors; release will ship partial output"

      - name: Inject update read-token into build
        shell: bash
        env:
          UPDATE_TOKEN: ${{ secrets.RELEASE_READ_TOKEN }}
        run: |
          if [ -z "$UPDATE_TOKEN" ]; then
            echo "::warning::RELEASE_READ_TOKEN secret not set — installed app won't be able to fetch updates from a private repo without GH_TOKEN in env"
            exit 0
          fi
          cat > src/main/build-token.ts <<EOF
          // Generated by release workflow. Do not commit.
          export const BUILD_TIME_UPDATE_TOKEN = '${UPDATE_TOKEN}';
          EOF
          echo "Baked read-only update token into src/main/build-token.ts"

      - name: Run release (build + publish)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VARIANT: ${{ steps.cfg.outputs.variant }}
          CONFIG_PATH: ${{ steps.inputs.outputs.config_path }}
          VERSION: ${{ steps.inputs.outputs.version }}
        run: node scripts/zota.js dist "$VARIANT" --client "$CONFIG_PATH" --version "$VERSION" --publish

      - name: Tag the commit (if dispatch requested it)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.create_tag == 'true' }}
        shell: bash
        env:
          CLIENT: ${{ steps.inputs.outputs.client }}
          VERSION: ${{ steps.inputs.outputs.version }}
        run: |
          TAG="${CLIENT}/v${VERSION}"
          git config user.name "zota-release-bot"
          git config user.email "release-bot@zota.local"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "### Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Client: \`${{ steps.inputs.outputs.client }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.inputs.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Variant: \`${{ steps.cfg.outputs.variant }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend branch: \`${{ steps.cfg.outputs.backend_branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend branch: \`${{ steps.cfg.outputs.frontend_branch }}\`" >> "$GITHUB_STEP_SUMMARY"
